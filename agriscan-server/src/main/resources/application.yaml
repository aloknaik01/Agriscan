spring:
  application:
    name: agriscan

  datasource:
    url: jdbc:postgresql://localhost:5432/agriscandb
    username: postgres
    password: alok@pgadmin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update   # dev: update | prod: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  sql:
    init:
      mode: always

server:
  port: 8080